services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sara_knowledge}
      POSTGRES_USER: ${POSTGRES_USER:-sara}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-sara_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-change_me}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command: -c 'mc alias set local http://minio:9000 "$${MINIO_ACCESS_KEY:-sara_minio}" "$${MINIO_SECRET_KEY:-change_me}" && mc mb --ignore-existing local/$${MINIO_BUCKET:-sara-assets}'
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-sara_minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-change_me}
      MINIO_BUCKET: ${MINIO_BUCKET:-sara-assets}

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_PORT:-8025}:8025"

  api:
    build:
      context: ./apps/api
    environment:
      APP_ENV: ${APP_ENV:-development}
      API_PORT: 4000
      DATABASE_URL: ${DATABASE_URL:-postgresql://sara:change_me@postgres:5432/sara_knowledge}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-sara_minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-change_me}
      MINIO_BUCKET: ${MINIO_BUCKET:-sara-assets}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost}
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:4000/health/live').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 10

  admin:
    build:
      context: ./apps/admin
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000/api/v1}
      PORT: 3000
    ports:
      - "${ADMIN_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy

  worker:
    build:
      context: ./apps/worker
    environment:
      APP_ENV: ${APP_ENV:-development}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DATABASE_URL: ${DATABASE_URL:-postgresql://sara:change_me@postgres:5432/sara_knowledge}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
